<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Waifu Generator | Random Anime Art</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <meta name="theme-color" content="#1a1a2e">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #1a1a2e 0%, #0f0f1a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
      padding: 1.5rem;
    }

    .waifu-card {
      max-width: 1100px;
      width: 100%;
      background: rgba(22, 22, 35, 0.7);
      backdrop-filter: blur(2px);
      border-radius: 2rem;
      padding: 1.5rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
      transition: all 0.2s ease;
    }

    h1 {
      text-align: center;
      font-size: clamp(1.8rem, 6vw, 2.6rem);
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #ffb7c5, #ff6a9e);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
      font-weight: 700;
      word-break: keep-all;
    }

    .sub {
      text-align: center;
      color: #bbbcd6;
      margin-bottom: 2rem;
      font-size: 0.9rem;
      border-bottom: 1px dashed #2c2c44;
      display: inline-block;
      width: auto;
      margin-left: auto;
      margin-right: auto;
      padding-bottom: 0.4rem;
    }

    .image-container {
      position: relative;
      background: #0a0a12;
      border-radius: 1.8rem;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 55vh;
      max-height: 70vh;
      margin-bottom: 1.8rem;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    #waifu {
      max-width: 100%;
      max-height: 68vh;
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
      transition: opacity 0.25s ease;
      opacity: 1;
    }

    .loader {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(10px);
      padding: 0.8rem 1.4rem;
      border-radius: 3rem;
      color: #ffb7c5;
      font-weight: 500;
      font-size: 1rem;
      letter-spacing: 0.5px;
      pointer-events: none;
      border: 1px solid #ff6a9e;
      font-family: monospace;
    }

    .button-group {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      margin-top: 0.5rem;
    }

    .btn {
      border: none;
      background: rgba(30, 30, 50, 0.9);
      backdrop-filter: blur(4px);
      padding: 0.9rem 1.8rem;
      border-radius: 3rem;
      font-size: 1rem;
      font-weight: 600;
      color: #f2e9ff;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .btn-primary {
      background: #ff4da6;
      color: white;
      box-shadow: 0 6px 14px rgba(255, 77, 166, 0.3);
    }

    .btn-primary:hover {
      background: #ff1e8e;
      transform: translateY(-3px);
      box-shadow: 0 12px 20px rgba(255, 30, 142, 0.4);
    }

    .btn-secondary {
      background: #2c2c44;
    }

    .btn-secondary:hover {
      background: #3e3e5e;
      transform: translateY(-2px);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .error-message {
      text-align: center;
      color: #ffb7b7;
      background: rgba(255, 0, 90, 0.2);
      padding: 0.6rem;
      border-radius: 2rem;
      font-size: 0.85rem;
      margin-top: 1rem;
      backdrop-filter: blur(4px);
    }

    footer {
      text-align: center;
      font-size: 0.75rem;
      color: #5a5a7a;
      margin-top: 1.8rem;
    }

    @media (max-width: 640px) {
      .waifu-card {
        padding: 1rem;
      }
      .btn {
        padding: 0.6rem 1.2rem;
        font-size: 0.85rem;
      }
      .image-container {
        min-height: 45vh;
      }
    }
  </style>
</head>
<body>
<div class="waifu-card">
  <h1>✨ Waifu Generator ✨</h1>
  <div style="text-align: center;"><span class="sub">anime art • no repeats • auto expand</span></div>

  <div class="image-container">
    <img id="waifu" src="" alt="random waifu artwork">
    <div id="loader" class="loader" style="display: none;">🌸 loading...</div>
  </div>

  <div class="button-group">
    <button class="btn btn-primary" id="newBtn">✨ New Waifu</button>
    <button class="btn btn-secondary" id="downloadBtn">💾 Download Image</button>
  </div>
  <div id="errorMsg" class="error-message" style="display: none;"></div>
  <footer>⚡ multiple APIs • smart anti-repeat • works on all browsers</footer>
</div>

<script>
  (function() {
    // ---------- CONFIGURATION ----------
    // List of APIs with parsers – each returns image URL or null on fail
    const API_LIST = [
      {
        url: "https://api.waifu.im/search?included_tags=maid&is_nsfw=false",
        parser: (data) => data.images?.[0]?.url || null
      },
      {
        url: "https://api.waifu.pics/sfw/waifu",
        parser: (data) => data.url || null
      },
      {
        url: "https://nekos.best/api/v2/waifu",
        parser: (data) => data.results?.[0]?.url || null
      },
      {
        url: "https://api.waifu.im/search?included_tags=waifu&is_nsfw=false",
        parser: (data) => data.images?.[0]?.url || null
      },
      {
        url: "https://nekos.life/api/v2/img/waifu",
        parser: (data) => data.url || null
      },
      {
        url: "https://api.waifu.pics/sfw/neko",
        parser: (data) => data.url || null
      }
    ];

    // Extreme fallback (only if ALL APIs fail network / parsing)
    // These are random public domain style images (anime style) – large variety ensures less repetition.
    // However main APIs will almost always work, this is last-resort to avoid broken UI.
    const STATIC_FALLBACKS = [
      "https://nekos.best/api/v2/neko/89ad0c09-112f-4111-9b86-5131b1e6d6ca.png",
      "https://nekos.best/api/v2/neko/bf5e4463-1458-445d-8118-9d0064dce802.png",
      "https://nekos.best/api/v2/neko/5005b597-1181-4a23-8517-f5a6b0855b82.png",
      "https://nekos.best/api/v2/neko/cb5efb0e-2a5a-4307-851a-cc95dfdd165a.png",
      "https://nekos.best/api/v2/neko/25df335c-f4f9-4975-9b18-47938c55c1d1.png",
      "https://nekos.best/api/v2/neko/4298b8b5-e442-4a39-b448-b4e86ee5d60e.png",
      "https://nekos.best/api/v2/neko/fb8c738d-cf64-46f2-8eaa-12c4c7c43554.png",
      "https://nekos.best/api/v2/neko/9c3b5dda-93a7-4fb5-9f6c-52603c73f6c3.png",
      "https://nekos.best/api/v2/neko/b0c5a592-6cb6-4497-8c14-bd7f19b64f25.png",
      "https://nekos.best/api/v2/neko/d7d1f7c6-09b1-4d45-9930-3c882f83196c.png"
    ];

    // DOM elements
    const imgEl = document.getElementById("waifu");
    const loaderEl = document.getElementById("loader");
    const newBtn = document.getElementById("newBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const errorMsgDiv = document.getElementById("errorMsg");

    let currentImgUrl = "";
    let lastImgUrl = "";         // for anti-repeat
    let isFetching = false;

    // Helper: shuffle array (Fisher-Yates)
    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    // Hide error & show loader
    function setLoading(loading) {
      isFetching = loading;
      if (loading) {
        loaderEl.style.display = "flex";
        errorMsgDiv.style.display = "none";
        imgEl.style.opacity = "0.6";
      } else {
        loaderEl.style.display = "none";
        imgEl.style.opacity = "1";
      }
    }

    function showError(text) {
      errorMsgDiv.innerText = text;
      errorMsgDiv.style.display = "block";
      setTimeout(() => {
        if (errorMsgDiv.innerText === text) errorMsgDiv.style.display = "none";
      }, 4000);
    }

    // Fetch image from a single API (with timeout 8s)
    async function fetchFromApi(apiConfig, signal) {
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 8000);
        const finalSignal = signal || controller.signal;
        const response = await fetch(apiConfig.url, { signal: finalSignal });
        clearTimeout(timeoutId);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        const url = apiConfig.parser(data);
        if (url && typeof url === "string" && url.startsWith("http")) return url;
        return null;
      } catch (err) {
        console.warn(`API failed: ${apiConfig.url}`, err.message);
        return null;
      }
    }

    // Get unique image (not equal to lastImgUrl)
    async function getUniqueImage() {
      // Create a shuffled copy of APIs to avoid always same order, increasing variety
      const shuffledApis = shuffleArray([...API_LIST]);
      
      // try each API in random order
      for (const api of shuffledApis) {
        const imgUrl = await fetchFromApi(api);
        if (imgUrl && imgUrl !== lastImgUrl) {
          return imgUrl;
        } else if (imgUrl && imgUrl === lastImgUrl) {
          // if same as last, we skip and try next API to avoid repetition
          console.log("Skipped repeated image from same API");
          continue;
        }
      }
      
      // if all APIs gave null OR repeated images -> fallback: static list
      // but also avoid repeating same static image twice in a row
      let availableFallbacks = STATIC_FALLBACKS.filter(fb => fb !== lastImgUrl);
      if (availableFallbacks.length === 0) availableFallbacks = STATIC_FALLBACKS; // fallback all if all were same as last (rare)
      const randomFallback = availableFallbacks[Math.floor(Math.random() * availableFallbacks.length)];
      return randomFallback;
    }

    // Core: new waifu with anti-repeat + robust error handling
    async function newWaifu() {
      if (isFetching) return;
      setLoading(true);
      
      try {
        const newUrl = await getUniqueImage();
        if (!newUrl) throw new Error("No image could be loaded");
        
        // Double-check: if newUrl still equals lastUrl (very rare, but prevent final repetition)
        if (newUrl === lastImgUrl) {
          // force grab a static fallback that is different
          const diffFallback = STATIC_FALLBACKS.find(fb => fb !== lastImgUrl) || STATIC_FALLBACKS[0];
          currentImgUrl = diffFallback;
          lastImgUrl = diffFallback;
          imgEl.src = diffFallback;
        } else {
          currentImgUrl = newUrl;
          lastImgUrl = newUrl;
          imgEl.src = newUrl;
        }
        
        // preload image and ensure it's loaded successfully
        await new Promise((resolve, reject) => {
          if (imgEl.complete && imgEl.naturalHeight !== 0) {
            resolve();
          } else {
            imgEl.onload = () => resolve();
            imgEl.onerror = () => reject(new Error("Image failed to load"));
            // set src again in case image was already loading?
            if (!imgEl.src) imgEl.src = currentImgUrl;
          }
        });
        
        errorMsgDiv.style.display = "none";
      } catch (err) {
        console.error(err);
        showError("⚠️ Failed to fetch waifu. Please check connection or try again.");
        // optional: show a placeholder but keep previous image if any
        if (!currentImgUrl) {
          imgEl.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23222244'/%3E%3Ctext x='50' y='55' fill='%23ff99cc' text-anchor='middle'%3E🌸%3C/text%3E%3C/svg%3E";
        }
      } finally {
        setLoading(false);
        imgEl.onload = null;
        imgEl.onerror = null;
      }
    }

    // Download function – universal (works on old & new browsers)
    // Opens image in a new tab (user can right-click save) – no proxy, CORS safe.
    function downloadCurrent() {
      if (!currentImgUrl) {
        showError("No waifu to download – generate one first!");
        return;
      }
      // Simply open image in new window/tab (most compatible)
      // For older browsers, window.open works perfect.
      const win = window.open(currentImgUrl, '_blank');
      if (!win || win.closed || typeof win.closed === 'undefined') {
        // fallback if popup blocked: create a temporary link
        const link = document.createElement('a');
        link.href = currentImgUrl;
        link.download = `waifu_${Date.now()}.jpg`;
        link.target = '_blank';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      }
    }

    // Event binding + initial load
    function bindEvents() {
      newBtn.addEventListener("click", (e) => {
        e.preventDefault();
        newWaifu();
      });
      downloadBtn.addEventListener("click", (e) => {
        e.preventDefault();
        downloadCurrent();
      });
    }

    // Polyfill for AbortController if extremely old (Edge <15, IE not supported)
    // But modern requirements: all browsers that matter have it, but to be safe we add simple fallback.
    if (typeof AbortController === 'undefined') {
      window.AbortController = function() {
        this.signal = { aborted: false };
        this.abort = function() { this.signal.aborted = true; };
      };
    }

    // Initialize
    bindEvents();
    // start with fresh random waifu (avoid repeat on first)
    (async function init() {
      await newWaifu();
    })();
  })();
</script>
</body>
</html>
